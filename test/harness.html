<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>WebReg 動作確認ハーネス (SharePoint REST モック)</title>
<style>body{font:14px/1.6 "Segoe UI",sans-serif;margin:24px}</style>
</head>
<body>
<h1>WebReg 動作確認ハーネス</h1>
<p>SharePoint REST API をメモリ上でモックし、bookmarklet 本体 (dist/app.js) を実行します。</p>
<script>
// ---- SharePoint REST の簡易モック ------------------------------------
(() => {
  const store = { lists: new Map() }; // title -> {Id, fields:Set, items:[], nextId}
  let guid = 1;
  const newGuid = () => 'mock-guid-' + (guid++);

  const getList = (title) => store.lists.get(title);
  const json = (status, body) => ({
    ok: status >= 200 && status < 300,
    status,
    json: async () => body == null ? {} : body,
    text: async () => body == null ? '' : JSON.stringify(body),
  });

  const realFetch = window.fetch;
  window.fetch = async (url, opts = {}) => {
    const u = String(url);
    // CSOM ProcessQuery(FieldLinks 並び替え)は成功レスポンスを返す
    if (u.includes('/_vti_bin/client.svc/ProcessQuery')) {
      return json(200, [{ SchemaVersion: '15.0.0.0', ErrorInfo: null }]);
    }
    if (!u.includes('/_api/')) return realFetch(url, opts);
    const headers = opts.headers || {};
    const xm = headers['X-HTTP-Method'];
    const method = xm || opts.method || 'GET';
    const body = opts.body ? JSON.parse(opts.body) : null;
    const path = decodeURIComponent(u.slice(u.indexOf('/_api/')));

    if (path.startsWith('/_api/contextinfo')) {
      return json(200, { FormDigestValue: 'mock-digest', FormDigestTimeoutSeconds: 1800 });
    }
    if (path.startsWith('/_api/site?') || path.startsWith('/_api/web?')) {
      return json(200, { Id: newGuid() });
    }
    // サイトの権限グループ / ロール定義
    if (path.startsWith('/_api/web/sitegroups')) {
      return json(200, { value: [
        { Id: 3, Title: 'n365 所有者' },
        { Id: 5, Title: 'n365 メンバー' },
        { Id: 6, Title: 'n365 閲覧者' },
        { Id: 11, Title: '事業会社A 担当' },
        { Id: 12, Title: '事業会社B 担当' },
        { Id: 20, Title: 'システム管理者' },
      ] });
    }
    if (path.startsWith('/_api/web/currentuser')) {
      return json(200, { Id: 99, Title: '実行者' });
    }
    if (path.startsWith('/_api/web/roledefinitions')) {
      return json(200, { value: [
        { Id: 1073741829, Name: 'フル コントロール', RoleTypeKind: 5 },
        { Id: 1073741830, Name: '編集', RoleTypeKind: 6 },
        { Id: 1073741827, Name: '投稿', RoleTypeKind: 3 },
        { Id: 1073741826, Name: '読み取り', RoleTypeKind: 2 },
      ] });
    }

    // リスト作成
    if (path === '/_api/web/lists' && method === 'POST') {
      const l = { Id: newGuid(), fields: new Map([['Title', 'タイトル']]), items: [], nextId: 1, view: ['LinkTitle'] };
      store.lists.set(body.Title, l);
      return json(201, { Id: l.Id });
    }

    const m = path.match(/^\/_api\/web\/lists\/getbytitle\('([^']*)'\)(.*)$/);
    if (!m) return json(400, { 'odata.error': { message: { value: 'mock: unknown ' + path } } });
    const [, title, rest] = m;
    const list = getList(title);
    if (!list) return json(404, {});

    if (rest.startsWith('?')) return json(200, { Id: list.Id });

    if (rest.startsWith('/fields/getbyinternalnameortitle(')) {
      const f = rest.match(/\('([^']*)'\)/)[1];
      list.fieldProps = list.fieldProps || {};
      if (xm === 'MERGE') {
        if (!list.fields.has(f)) return json(400, { 'odata.error': { message: { value: "列 '" + f + "' が存在しません。" } } });
        if (body && body.Title) list.fields.set(f, body.Title); // 表示名変更
        if (body && body.Choices) (list.fieldProps[f] = list.fieldProps[f] || {}).Choices = body.Choices;
        if (body && body.Formula) (list.fieldProps[f] = list.fieldProps[f] || {}).Formula = body.Formula;
        if (body && body.ClientValidationFormula != null) (list.fieldProps[f] = list.fieldProps[f] || {}).ClientValidationFormula = body.ClientValidationFormula;
        return json(204, null);
      }
      if (xm === 'DELETE') {
        if (!list.fields.has(f)) return json(400, { 'odata.error': { message: { value: "列 '" + f + "' が存在しません。" } } });
        list.fields.delete(f);
        delete list.fieldProps[f];
        return json(204, null);
      }
      // 実機同様: 存在しない列は 404 ではなく 400 ArgumentException
      return list.fields.has(f)
        ? json(200, Object.assign({ Id: newGuid(), Title: list.fields.get(f) }, list.fieldProps[f] || {}))
        : json(400, { 'odata.error': { code: '-2147024809, System.ArgumentException', message: { value: "列 '" + f + "' が存在しません。" } } });
    }
    if (rest.startsWith('/fields?') && rest.includes('$filter=InternalName eq')) {
      const f = rest.match(/InternalName eq '([^']*)'/)[1];
      list.fieldProps = list.fieldProps || {};
      return json(200, { value: list.fields.has(f)
        ? [Object.assign({ Id: newGuid(), Title: list.fields.get(f) }, list.fieldProps[f] || {})] : [] });
    }
    if (rest.startsWith('/fields?') && rest.includes("$filter=startswith(InternalName,")) {
      const pre = rest.match(/startswith\(InternalName,'([^']*)'\)/)[1];
      list.fieldProps = list.fieldProps || {};
      const value = [...list.fields.entries()]
        .filter(([n]) => n.startsWith(pre))
        .map(([n, t]) => Object.assign({ InternalName: n, Title: t }, list.fieldProps[n] || {}));
      return json(200, { value });
    }
    if (rest === '/fields' && method === 'POST') {
      list.fields.set(body.Title, body.Title);
      list.fieldProps = list.fieldProps || {};
      const kinds = { 2: 'Text', 3: 'Note', 4: 'DateTime', 6: 'Choice', 8: 'Boolean', 9: 'Number', 17: 'Calculated' };
      list.fieldProps[body.Title] = { TypeAsString: kinds[body.FieldTypeKind] || 'Text' };
      return json(201, { Id: newGuid() });
    }
    if (rest === '/fields/createfieldasxml' && method === 'POST') {
      const xml = body.parameters.SchemaXml;
      const name = xml.match(/ Name='([^']*)'/)[1];
      const disp = (xml.match(/DisplayName='([^']*)'/) || [null, name])[1];
      // 実機同様: 同名フィールドの再作成はエラー
      if (list.fields.has(name)) return json(400, { 'odata.error': { message: { value: "列 '" + name + "' は既に存在します。" } } });
      list.fields.set(name, disp);
      list.fieldProps = list.fieldProps || {};
      const type = (xml.match(/ Type='([^']*)'/) || [null, 'Text'])[1];
      list.fieldProps[name] = { TypeAsString: type };
      const choices = [...xml.matchAll(/<CHOICE>([^<]*)<\/CHOICE>/g)].map((m) => m[1]);
      if (choices.length) list.fieldProps[name].Choices = choices;
      const fm = xml.match(/<Formula>([\s\S]*?)<\/Formula>/);
      if (fm) {
        list.fieldProps[name].Formula = fm[1]
          .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&amp;/g, '&');
      }
      return json(201, { Id: newGuid() });
    }
    if (rest.startsWith('/defaultview/viewfields/addviewfield(')) {
      const f = rest.match(/\('([^']*)'\)/)[1];
      list.view = list.view || ['LinkTitle'];
      list.view.push(f); // 実機同様: 既存でも重複追加される
      return json(204, null);
    }
    if (rest.startsWith('/defaultview/viewfields/removeviewfield(')) {
      const f = rest.match(/\('([^']*)'\)/)[1];
      list.view = (list.view || []).filter((n) => n !== f);
      return json(204, null);
    }
    if (rest === '/defaultview/viewfields/moveviewfieldto' && method === 'POST') {
      list.view = list.view || [];
      const i = list.view.indexOf(body.field);
      if (i >= 0) list.view.splice(i, 1);
      list.view.splice(body.index, 0, body.field);
      return json(204, null);
    }
    if (rest === '/defaultview/viewfields' || rest.startsWith('/defaultview/viewfields?')) {
      return json(200, { Items: list.view || ['LinkTitle'] });
    }
    if (rest.startsWith('/contenttypes(') && rest.includes('/fieldlinks')) {
      return json(200, { value: [...list.fields.keys()].map((n) => ({ Name: n })) });
    }
    if (rest.startsWith('/contenttypes')) {
      return json(200, { value: [{ StringId: '0x0100MOCK', Name: 'アイテム' }] });
    }

    // アイテム
    if (rest.startsWith('/items')) {
      const im = rest.match(/^\/items\((\d+)\)/);
      if (im) {
        const id = +im[1];
        const idx = list.items.findIndex((x) => x.Id === id);
        if (idx < 0) return json(404, {});
        const it = list.items[idx];
        const sub = rest.slice(im[0].length);
        // 行レベル権限(継承解除/復帰/ロール割当)。
        // 実機検証では copyroleassignments=false で全クリアされたが、ここでは
        // 「既定の継承割当が残るテナント」の最悪ケースを再現し、明示削除の経路をテストする
        if (sub.startsWith('/breakroleinheritance')) {
          it.__perm = { broken: true, assignments: [
            { principalId: 3, roleDefId: 1073741829 },  // 所有者=フル(継承コピーの想定)
            { principalId: 5, roleDefId: 1073741830 },  // メンバー=編集
            { principalId: 6, roleDefId: 1073741826 },  // 閲覧者=読み取り
            { principalId: 99, roleDefId: 1073741829 }, // 実行者(SPの自動付与)
          ] };
          return json(204, null);
        }
        if (sub.startsWith('/resetroleinheritance')) {
          delete it.__perm;
          return json(204, null);
        }
        if (sub.startsWith('/roleassignments?')) {
          const as = (it.__perm && it.__perm.assignments) || [];
          return json(200, { value: as.map((a) => ({ PrincipalId: a.principalId })) });
        }
        const rd = sub.match(/^\/roleassignments\/getbyprincipalid\((\d+)\)/);
        if (rd && xm === 'DELETE') {
          if (!it.__perm) return json(400, { 'odata.error': { message: { value: 'mock: 継承中は削除不可' } } });
          it.__perm.assignments = it.__perm.assignments.filter((a) => a.principalId !== +rd[1]);
          return json(204, null);
        }
        const ra = sub.match(/^\/roleassignments\/addroleassignment\(principalid=(\d+),roledefid=(\d+)\)/);
        if (ra) {
          if (!it.__perm || !it.__perm.broken) return json(400, { 'odata.error': { message: { value: 'mock: 継承中のアイテムには割当できません' } } });
          it.__perm.assignments.push({ principalId: +ra[1], roleDefId: +ra[2] });
          return json(204, null);
        }
        if (xm === 'DELETE') { list.items.splice(idx, 1); return json(204, null); }
        if (xm === 'MERGE') {
          Object.assign(it, body, { Modified: new Date().toISOString() });
          return json(204, null);
        }
      }
      if (method === 'POST' && !xm) {
        const now = new Date().toISOString();
        const it = Object.assign({ Id: list.nextId++, Created: now, Modified: now }, body);
        list.items.push(it);
        return json(201, { Id: it.Id });
      }
      // GET — 全プロパティを返し、$expand=Level1 のときは Level1:{Id} 形式も付与
      const expand = rest.includes('$expand=Level1');
      const desc = rest.includes('$orderby=Id desc');
      const tf = rest.match(/\$filter=Title eq '([^']*)'/);
      const items = [...list.items].filter((x) => !tf || x.Title === tf[1]).sort((a, b) => desc ? (b.Id - a.Id)
        : ((a.SortOrder || 0) - (b.SortOrder || 0) || a.Id - b.Id))
        .map((x) => {
          const o = Object.assign({}, x);
          if (expand) o.Level1 = x.Level1Id ? { Id: x.Level1Id } : null;
          return o;
        });
      return json(200, { value: items });
    }
    return json(400, { 'odata.error': { message: { value: 'mock: unhandled ' + method + ' ' + rest } } });
  };
})();
</script>
<script src="../dist/webreg.bundle.js"></script>
</body>
</html>
